<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gilam Operator</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

  <!-- ═══ COMPONENT CONTAINERS ═════════════════════════════════════════ -->
  <!-- Komponentlar component-loader.js orqali avtomatik yuklanadi -->

  <div id="app-root"></div>

  <!-- TOAST NOTIFICATIONS -->
  <div id="toast-container"></div>

  <!-- AUDIO -->
  <audio id="ringtone" loop preload="auto">
    <source src="assets/ringtone.wav" type="audio/wav">
  </audio>

  <!-- ═══ MAP MODAL ═══════════════════════════════════════════════════ -->
  <div id="map-modal" class="map-modal" style="display:none;">
    <div class="map-modal-content">
      <div class="map-modal-header">
        <div class="map-modal-title">
          <span class="material-icons-round">location_on</span>
          <span>Lokatsiyani tanlang</span>
        </div>
        <button class="map-modal-close" id="map-modal-close">
          <span class="material-icons-round">close</span>
        </button>
      </div>
      <div id="map-container" class="map-container"></div>
      <div class="map-modal-footer">
        <div class="map-coords">
          <span class="material-icons-round">gps_fixed</span>
          <span id="map-coords-text">Xaritadan joy tanlang</span>
        </div>
        <div class="map-actions">
          <button class="btn-crm btn-crm-secondary" id="map-cancel">Bekor</button>
          <button class="btn-crm btn-crm-primary" id="map-confirm">
            <span class="material-icons-round">check</span> Tasdiqlash
          </button>
        </div>
      </div>
    </div>
  </div>



  <!-- ═══ SCRIPTS ══════════════════════════════════════════════════════ -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="node_modules/socket.io-client/dist/socket.io.js"></script>
  <script src="src/js/component-loader.js"></script>
  <script src="src/js/utils.js"></script>
  <script src="src/js/api.js"></script>
  <script src="src/js/ui.js"></script>
  <script src="src/js/sip-client.js"></script>
  <script src="src/js/crm.js"></script>
  <script src="src/js/settings.js"></script>
  <script src="src/js/chat.js"></script>
  <script src="src/js/app.js"></script>

</body>
</html>
